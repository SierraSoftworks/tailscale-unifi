name: Bug Report
title: "[BUG] - [Short description of the bug]"
description: Report a reproducible bug.
type: "Bug"
body:
  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Device information
      description: |
        - Variant (e.g. UniFi Cloud Gateway or UniFi Dream Machine Pro SE):
        - UniFi OS (UOS) version (e.g. 5.x.x):
        - UniFi Network Application (UNA) version (e.g. 10.x.x):
        - Tailscale version (e.g. 1.x.x):
        - Tailscale device type (e.g. iOS, Android, Windows, macOS, Linux):
    validations:
      required: true
  - type: textarea
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context about the problem here.