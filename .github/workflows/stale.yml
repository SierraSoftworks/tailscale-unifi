name: "Close Stale Issues and PRs"
on:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  close-issues:
    runs-on: ubuntu-slim
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          days-before-stale: 7
          days-before-close: 3
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-pr-labels: "keep-open"
          exempt-issue-labels: "keep-open"
          stale-issue-message: "This issue has been marked as stale and will be closed if
            no further activity occurs."
          stale-pr-message: "This pull request has been marked as stale and will be closed
            if no further activity occurs."
          close-issue-message: "This issue has been closed after being marked as stale
            because no further activity occurred."
          close-pr-message: "This pull request has been closed after being marked as stale
            because no further activity occurred."
